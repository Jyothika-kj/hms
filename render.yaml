services:
  - type: web
    name: hms-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py create_admin && gunicorn hms_core.wsgi:application --bind 0.0.0.0:10000 --timeout 120 --workers 1"
    envVars:
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@hms.com
      - key: ADMIN_PASSWORD
        value: Hms@1234
      - key: DEBUG
        value: False